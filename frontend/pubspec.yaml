name: maternal_health_ai
description: Offline Maternal Health Symptom Checker using AI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  image_picker: ^1.1.2
  record: ^6.2.0
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  open_file: ^3.5.11
  flutter_spinkit: ^5.2.2
  google_fonts: ^6.2.1
  provider: ^6.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
